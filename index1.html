<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#003775">
    <meta charset="UTF-8">
    <link rel="icon" href="logo.png" sizes="192x192" type="image/png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style1.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المهام الاسبوعيه</title>
</head>
<body>
<div class="input-group">
    <input type="text" id="fullTaskInput" placeholder="المهمة...">
    <select id="fullTaskDay">
        <option value="sat">السبت</option>
        <option value="sun">الأحد</option>
        <option value="mon">الإثنين</option>
        <option value="tue">الثلاثاء</option>
        <option value="wed">الأربعاء</option>
        <option value="thu">الخميس</option>
        <option value="fri">الجمعة</option>
    </select>
    <button onclick="addFullTask()">إضافة</button>
    <a class="a-home" href="index.html">الرئيسية</a>
</div>

<div class="timetable" style="grid-template-columns: repeat(7, 1fr);">
    <div class="day-header">السبت</div>
    <div class="day-header">الأحد</div>
    <div class="day-header">الإثنين</div>
    <div class="day-header">الثلاثاء</div>
    <div class="day-header">الأربعاء</div>
    <div class="day-header">الخميس</div>
    <div class="day-header" style="background:#01b90b">الجمعة</div>

    <div id="sat-tasks" class="day-column"></div>
    <div id="sun-tasks" class="day-column"></div>
    <div id="mon-tasks" class="day-column"></div>
    <div id="tue-tasks" class="day-column"></div>
    <div id="wed-tasks" class="day-column"></div>
    <div id="thu-tasks" class="day-column"></div>
    <div id="fri-tasks" class="day-column"></div>
</div>
<script src="main1.js"></script>
</body>
</html>
